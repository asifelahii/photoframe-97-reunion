<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <title>SSC 97 Reunion Photo Frame</title>
    <link rel="icon" href="assets/favicon.png" />
    <meta name="theme-color" content="#0b5dbb" />

    <!-- Social share -->
    <meta property="og:title" content="SSC 97 Reunion Photo Frame" />
    <meta
      property="og:description"
      content="Add the SSC 97 Reunion frame to your photo and share it!"
    />
    <meta property="og:image" content="assets/social-preview.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://confbim.com/photoframe/" />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

      <img
        src="assets/logo-bim2025.png"

    <!-- after .intro-card -->
    <div class="promo-badge">
      <span>Powered by</span>
      <img src="assets/logo-cpc.png" alt="DIU CPC" />
      <strong>DIU Computer Programming Club</strong>
    </div>

    <div class="promo-badge">
      <span> Made with &#10084;&#65039; by</span>
      <strong> Asif Elahi</strong>
    </div>

    <section class="controls primary-actions">
      <label class="btn" id="uploadLabel">
        <input type="file" id="uploader" accept="image/*" hidden />
        Choose Photo
      </label>

      <button id="download" class="btn btn-accent">Download</button>
    </section>

    <section class="controls secondary-actions">
      <label class="select">
        Frame:
        <select id="framePicker">
          <!-- <option value="assets/frames/Profile_Frame.png" selected>
            BIM 2025
          </option> -->
          <option value="assets/frames/frame.png" selected>
            97 Reunion Photo Frame
          </option>
        </select>
      </label>

      <label>
        Zoom:
        <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="1" />
      </label>

      <label>
        Rotate:
        <input
          type="range"
          id="rotate"
          min="-180"
          max="180"
          step="1"
          value="0"
        />
      </label>

      <button id="fit">Fit to Frame</button>
      <button id="reset">Reset</button>
    </section>

    <div class="canvas-wrap">
      <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <!-- Share preview card -->
    <div class="share-preview">
      <p>Preview your post:</p>
      <img id="previewImg" alt="Preview" />
    </div>

    <!-- replace your current <footer> ... </footer> block -->
    <footer>
      <small>©2026 Developed with &#10084;&#65039; by Asif Elahi</small>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
